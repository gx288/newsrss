name: LiveScience Scraper (Data Raw)

on:
  schedule:
    - cron: '0 1 * * *'       # Mỗi ngày chạy lúc 8h sáng VN
  workflow_dispatch:          # Cho phép chạy thủ công

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 gspread google-auth lxml

      - name: Create credentials.json
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          mkdir -p khoahoctv
          echo "$GOOGLE_SHEETS_CREDENTIALS" > khoahoctv/credentials.json

      - name: Run Scraper Script
        run: |
          python -u livescience_scraper.py
