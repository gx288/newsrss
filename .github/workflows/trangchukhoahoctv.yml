name: KhoaHoc.tv Full - Crawl + RSS + Sheet

on:
  schedule:
    - cron: '0 0 * * *'        # Chạy 1 lần/ngày lúc 00:00 UTC (~7h sáng VN)
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Số trang tối đa (all hoặc số cụ thể)'
        required: false
        default: 'all'

jobs:
  full-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml gspread google-auth

      - name: Tạo credentials.json
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          mkdir -p khoahoctv
          echo "$GOOGLE_SHEETS_CREDENTIALS" > khoahoctv/credentials.json

      - name: Prepare max_pages
        run: |
          echo "MAX_PAGES=${{ github.event.inputs.max_pages || 'all' }}" >> $GITHUB_ENV

      - name: Chạy full script
        run: |
          python -u khoahoctv/khoahoc_full.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add khoahoctv/
          if ! git diff --staged --quiet; then
            git commit -m "Auto update KhoaHoc.tv Full [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
          fi
