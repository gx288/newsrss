name: Lay Anh & Views Khoahoc.tv - Daily Run

on:
  schedule:
    - cron: '0 23 * * *'      # Chạy lúc 23:00 UTC = 6:00 sáng Việt Nam hôm sau
  workflow_dispatch:          # Cho phép chạy thủ công

jobs:
  update-images-and-views:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth beautifulsoup4 requests lxml

      - name: Tạo file credentials.json từ GitHub Secret
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: |
          mkdir -p khoahoctv
          echo "$GOOGLE_SHEETS_CREDENTIALS" > khoahoctv/credentials.json

      - name: Chạy script lấy ảnh + lượt xem
        run: |
          python -u khoahoctv/layanhkhoahocyhoc.py

      - name: Commit changes if any
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add khoahoctv/
          if git diff --staged --quiet; then
            echo "Không có thay đổi nào trong sheet."
          else
            git commit -m "Auto update ảnh + lượt xem KhoaHoc.tv [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
            echo "✅ Đã commit thay đổi vào repository."
          fi
